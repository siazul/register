<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDIH REGISTER HUKUM</title>
    <style>
    body, html { 
        margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; 
    }
    .wrapper {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: relative;
    }
    iframe { 
        position: absolute;
        top: -50px;       /* Hanya memotong sedikit bagian atas */
        left: 0;
        width: 100%; 
        height: calc(100% + 50px);
        border: none;
        /* Tambahkan ini untuk mencegah pergeseran sisi kiri */
        box-sizing: border-box;
    }
</style>
</head>
<body>
    <div class="wrapper">
        <iframe src="https://script.google.com/macros/s/AKfycbxd1gzK35bnS1L0np7H5PDwbSsv6opcbUQ1GCLj_xciJc2q1WBi42_dd6fPqUZiMCqy/exec"></iframe>
    </div>
</body>
</html>
