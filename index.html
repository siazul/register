<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDIH REGISTER HUKUM</title>
    <style>
        /* Menghilangkan scrollbar dan margin agar aplikasi tampil penuh */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #ffffff;
        }

        /* Container untuk menampung iframe */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Mengatur iframe agar menutupi header Google */
        iframe { 
            position: absolute;
            top: -55px; /* Menggeser header Google ke atas agar keluar dari layar */
            left: 0;
            width: 100%; 
            height: calc(100% + 55px); /* Menambah tinggi agar aplikasi tidak terpotong */
            border: none; 
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <iframe src="https://script.google.com/macros/s/AKfycbxd1gzK35bnS1L0np7H5PDwbSsv6opcbUQ1GCLj_xciJc2q1WBi42_dd6fPqUZiMCqy/exec"></iframe>
    </div>
</body>
</html>
