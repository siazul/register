<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDIH REGISTER HUKUM</title>
    <style>
        /* Reset margin dan padding agar full-screen */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Mencegah munculnya scrollbar */
            background-color: #ffffff;
        }

        /* Mengatur iframe agar benar-benar menutupi header Google */
        .full-iframe {
            position: absolute;
            top: -55px;       /* Menutup header Google Apps Script */
            left: 0;
            width: 100%;
            height: calc(100% + 55px); /* Menambah tinggi agar bawah tidak terpotong */
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbxd1gzK35bnS1L0np7H5PDwbSsv6opcbUQ1GCLj_xciJc2q1WBi42_dd6fPqUZiMCqy/exec"
        class="full-iframe"
        sandbox="allow-forms allow-scripts allow-same-origin allow-popups"
        allowfullscreen>
    </iframe>

</body>
</html>
