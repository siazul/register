<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>JDIH | Register Hukum</title>
</head>
<body>
    <div id="app">Memuat data...</div>

    <script>
        // URL Web App GAS Anda (Pastikan sudah di-deploy sebagai Web App)
        const url = "https://script.google.com/macros/s/AKfycbxd1gzK35bnS1L0np7H5PDwbSsv6opcbUQ1GCLj_xciJc2q1WBi42_dd6fPqUZiMCqy/exec";

        fetch(url)
            .then(response => response.text())
            .then(data => {
                document.getElementById('app').innerHTML = data;
            });
    </script>
</body>
</html>
